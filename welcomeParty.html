        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: url("img/andy-wallpaper.jpg");
            background-repeat: repeat;
            background-size: 500px;

        }

        .card {

            width: 100%;
            max-width: 760px;
            background: #FFD84D;
            border: 2px solid #0A55C6;
            border-radius: 20px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .25);
            animation: aparecer .45s ease;

        }

        @keyframes aparecer {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        .title {

            font-size: 50px;
            font-weight: 800;
            color: #0A55C6;
            text-shadow: 1px 1px 0 #FFFFFF, 1px 1px 0 #FFFFFF;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .message {
            color: #0A55C6;
            font-size: 26px;
            line-height: 1.9;
            font-weight: 500;
            text-transform: uppercase;
        }

        .message strong {
            font-weight: 800;
        }

        .guest-list {
            width: 100%;
            align-items: center;
            max-width: 100%;
            margin-top: 45px;
            margin-bottom: 45px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .guest {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
            white-space: nowrap;
            text-align: left;
            font-size: 38px;
            font-weight: 800;
            color: #0A55C6;
            text-shadow: 1px 1px 0 #FFFFFF, 2px 2px 0 #FFFFFF;

        }

        .guest span {
            display: flex;
            width: 42px;
            text-align: center;
            margin-top: -6px;
        }

        .invalid {

            color: #0A55C6;

            font-size: 26px;

            font-weight: 700;

            text-transform: uppercase;

        }

        @media(max-width:700px) {

            body {

                background-size: 320px;

                padding: 15px;

            }

            .card {

                padding: 35px 22px;

            }

            .title {

                font-size: 34px;

            }

            .message {

                font-size: 20px;

                line-height: 1.8;

            }

            .guest {

                font-size: 28px;

            }

            .guest span {

                width: 30px;

            }

            .footer {

                font-size: 20px;

            }

        }

        .frase {
            margin-top: 35px;
            font-size: 18px;
            font-style: italic;
            color: #0a55c6bc;
            font-weight: 700;
            text-transform: uppercase;
